<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ app_name }}</title>
  <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
  <header class="topbar">
    <a class="brand" href="/">{{ app_name }}</a>
    <span class="version">v{{ app_version }}</span>
    {% if request.url.path not in ["/login", "/setup"] %}
    <nav class="nav">
      <a href="/" class="{{ 'active' if request.url.path == '/' else '' }}">Inicio</a>
      <a href="/settings" class="{{ 'active' if request.url.path == '/settings' else '' }}">Configuracion</a>
      <a href="/skills" class="{{ 'active' if request.url.path == '/skills' else '' }}">Skills</a>
      <a href="/users" class="{{ 'active' if request.url.path == '/users' else '' }}">Usuarios</a>
      <a href="/levels" class="{{ 'active' if request.url.path == '/levels' else '' }}">Niveles</a>
      <a href="/improvement" class="{{ 'active' if request.url.path == '/improvement' else '' }}">Mejora continua</a>
      <a href="/logs" class="{{ 'active' if request.url.path == '/logs' else '' }}">Logs</a>
    </nav>
    <form action="/logout" method="post">
      <button type="submit">Salir</button>
    </form>
    {% endif %}
  </header>
  <main class="page">
    {% block content %}{% endblock %}
  </main>
</body>
</html>
